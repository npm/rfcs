name: RFC validate

on:
  pull_request:
    paths:
      - accepted/**
      - implemented/**
      - withdrawn/**

permissions:
  contents: read

jobs:
  validate:
    name: Validate RFC files
    if: github.repository_owner == 'npm'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Determine changed RFC files
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          files=$(git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" \
            -- 'accepted/*.md' 'implemented/*.md' 'withdrawn/*.md' || true)
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Validate changed files
        if: steps.changed.outputs.files != ''
        env:
          FILES: ${{ steps.changed.outputs.files }}
        run: |
          # shellcheck disable=SC2086
          npm run rfc:validate -- $FILES
      - name: No RFC files changed
        if: steps.changed.outputs.files == ''
        run: echo "No RFC files changed in this PR. Nothing to validate."
